<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="cryptoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7931A"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0A1E"/>
      <stop offset="100%" stop-color="#1A1035"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon — breathing -->
  <polygon points="50,5 82,22 82,58 50,75 18,58 18,22"
    fill="url(#hexFill)"
    stroke="url(#cryptoGrad)"
    stroke-width="2"
    filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.82;1" dur="3s" repeatCount="indefinite"/>
  </polygon>

  <!-- Inner hex ring — static -->
  <polygon points="50,12 76,27 76,53 50,68 24,53 24,27"
    fill="none"
    stroke="url(#cryptoGrad)"
    stroke-width="0.5"
    opacity="0.25"/>

  <!-- ₿ symbol — soft opacity pulse only -->
  <text x="50" y="48" font-family="Georgia, serif" font-size="29" font-weight="700"
    text-anchor="middle"
    fill="url(#cryptoGrad)"
    filter="url(#glowGold)">
    ₿
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
  </text>

  <!-- Blockchain nodes — 3 squares -->
  <rect x="27" y="53" width="4" height="4" rx="0.5" fill="url(#purpleGrad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <rect x="48" y="58" width="4" height="4" rx="0.5" fill="url(#purpleGrad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="69" y="53" width="4" height="4" rx="0.5" fill="url(#purpleGrad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" begin="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Node connectors -->
  <line x1="31" y1="55" x2="48" y2="60" stroke="url(#purpleGrad)" stroke-width="0.6" stroke-dasharray="2,2">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="52" y1="60" x2="69" y2="55" stroke="url(#purpleGrad)" stroke-width="0.6" stroke-dasharray="2,2">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
  </line>

  <!-- Live signal dot — orange pulse -->
  <circle cx="50" cy="86" r="4" fill="#F7931A" opacity="0.9" filter="url(#glowStrong)">
    <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="86" r="7" fill="none" stroke="#F7931A" stroke-width="0.8">
    <animate attributeName="r" values="7;11;7" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="86" r="10" fill="none" stroke="#FFD700" stroke-width="0.4">
    <animate attributeName="r" values="10;15;10" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>

</svg>