<svg width="200" height="200" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFB2" />
      <stop offset="100%" stop-color="#00C2FF" />
    </linearGradient>
    
    <linearGradient id="bullGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FFB2" />
      <stop offset="100%" stop-color="#00C28A" />
    </linearGradient>

    <linearGradient id="bearGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B81" />
      <stop offset="100%" stop-color="#FF2D4A" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @keyframes candleMove {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes hexRotate {
        0% { stroke-dashoffset: 300; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes signalPulse {
        0% { opacity: 0.3; transform: scale(0.8); }
        100% { opacity: 1; transform: scale(1.2); }
      }
      .candle-1 { animation: candleMove 1.5s ease-in-out infinite; transform-origin: center; }
      .candle-2 { animation: candleMove 1.5s ease-in-out infinite 0.2s; transform-origin: center; }
      .candle-3 { animation: candleMove 1.5s ease-in-out infinite 0.4s; transform-origin: center; }
      .hex-border { 
        stroke-dasharray: 100; 
        animation: hexRotate 4s linear infinite; 
      }
      .dot-pulse { 
        animation: signalPulse 0.8s ease-in-out infinite alternate; 
        transform-origin: 50px 86px; 
      }
    </style>
  </defs>

  <polygon 
    points="50,5 82,22 82,58 50,75 18,58 18,22"
    fill="#0A1628"
    stroke="url(#neonGrad)"
    stroke-width="1.5"
    class="hex-border"
    filter="url(#glow)"
  />

  <g class="candle-1">
    <rect x="34.2" y="21" width="1.6" height="8" rx="0.8" fill="#FF4C6A" />
    <rect x="31" y="29" width="8" height="18" rx="1" fill="url(#bearGrad)" filter="url(#glow)" />
    <rect x="34.2" y="47" width="1.6" height="10" rx="0.8" fill="#FF4C6A" />
  </g>

  <g class="candle-2">
    <rect x="49.2" y="23" width="1.6" height="9" rx="0.8" fill="#00FFB2" />
    <rect x="46" y="32" width="8" height="14" rx="1" fill="url(#bullGrad)" filter="url(#glow)" />
    <rect x="49.2" y="46" width="1.6" height="10" rx="0.8" fill="#00FFB2" />
  </g>

  <g class="candle-3">
    <rect x="64.2" y="18" width="1.6" height="8" rx="0.8" fill="#00FFB2" />
    <rect x="61" y="26" width="8" height="22" rx="1" fill="url(#bullGrad)" filter="url(#glow)" />
    <rect x="64.2" y="48" width="1.6" height="9" rx="0.8" fill="#00FFB2" />
  </g>

  <circle cx="50" cy="86" r="3" fill="#00FFB2" class="dot-pulse" filter="url(#glow)" />
</svg>