<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFB2"/>
      <stop offset="100%" stop-color="#00C2FF"/>
    </linearGradient>
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0D2040"/>
    </linearGradient>
    <linearGradient id="bullGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FFB2"/>
      <stop offset="100%" stop-color="#00C28A"/>
    </linearGradient>
    <linearGradient id="bearGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B81"/>
      <stop offset="100%" stop-color="#FF2D4A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon — subtle breathing glow -->
  <polygon points="50,5 82,22 82,58 50,75 18,58 18,22"
    fill="url(#hexFill)"
    stroke="url(#neonGrad)"
    stroke-width="2"
    filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.82;1" dur="3s" repeatCount="indefinite"/>
  </polygon>

  <!-- Inner hex ring — slow rotate -->
  <polygon points="50,12 76,27 76,53 50,68 24,53 24,27"
    fill="none"
    stroke="url(#neonGrad)"
    stroke-width="0.5"
    opacity="0.25"
    transform-origin="50 40">
    <animateTransform attributeName="transform" type="rotate" from="0 50 40" to="360 50 40" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.5;0.25" dur="4s" repeatCount="indefinite"/>
  </polygon>

  <!-- CANDLE 1 — Bearish (red) -->
  <g>
    <animate attributeName="opacity" values="1;0.75;1" dur="4s" begin="0s" repeatCount="indefinite"/>
    <rect x="34.2" y="21" width="1.6" height="8" rx="0.8" fill="#FF4C6A"/>
    <rect x="31" y="29" width="8" height="18" rx="1" fill="url(#bearGrad)" filter="url(#glow)" opacity="0.95"/>
    <rect x="31" y="29" width="8" height="18" rx="1" fill="none" stroke="#FF2D4A" stroke-width="0.5" opacity="0.6"/>
    <rect x="34.2" y="47" width="1.6" height="10" rx="0.8" fill="#FF4C6A"/>
  </g>

  <!-- CANDLE 2 — Bullish small (green) -->
  <g>
    <animate attributeName="opacity" values="1;0.75;1" dur="4s" begin="0.6s" repeatCount="indefinite"/>
    <rect x="49.2" y="23" width="1.6" height="9" rx="0.8" fill="#00FFB2"/>
    <rect x="46" y="32" width="8" height="14" rx="1" fill="url(#bullGrad)" filter="url(#glow)" opacity="0.95"/>
    <rect x="46" y="32" width="8" height="14" rx="1" fill="none" stroke="#00FFB2" stroke-width="0.5" opacity="0.5"/>
    <rect x="49.2" y="46" width="1.6" height="10" rx="0.8" fill="#00FFB2"/>
  </g>

  <!-- CANDLE 3 — Bullish strong (green) -->
  <g>
    <animate attributeName="opacity" values="1;0.75;1" dur="4s" begin="1.2s" repeatCount="indefinite"/>
    <rect x="64.2" y="18" width="1.6" height="8" rx="0.8" fill="#00FFB2"/>
    <rect x="61" y="26" width="8" height="22" rx="1" fill="url(#bullGrad)" filter="url(#glow)" opacity="0.95"/>
    <rect x="61" y="26" width="8" height="22" rx="1" fill="none" stroke="#00FFB2" stroke-width="0.5" opacity="0.5"/>
    <rect x="64.2" y="48" width="1.6" height="9" rx="0.8" fill="#00FFB2"/>
  </g>

  <!-- Live signal dot — pulse -->
  <circle cx="50" cy="86" r="4" fill="#00FFB2" opacity="0.9" filter="url(#glowStrong)">
    <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="86" r="7" fill="none" stroke="#00FFB2" stroke-width="0.8">
    <animate attributeName="r" values="7;11;7" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="86" r="10" fill="none" stroke="#00FFB2" stroke-width="0.4">
    <animate attributeName="r" values="10;15;10" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>

</svg>